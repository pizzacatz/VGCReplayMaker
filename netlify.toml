# Netlify build config. Connect this repo at app.netlify.com → "Add new site" →
# "Import an existing project" → pick GitHub → this repo. Netlify reads this file;
# no extra settings needed. Every push to main auto-deploys.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Single-page app: serve index.html for any path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
